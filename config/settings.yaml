# Centralized Configuration Loader
database:
  chroma_db_path: ".chroma"
  mode: "sqlite" # 'sqlite' or 'pgvector'
  # Set pgvector_dsn in .env as DATABASE__PGVECTOR_DSN

server:
  host: "0.0.0.0"
  port: 8000
  # Set webhook_secret in .env as SERVER__WEBHOOK_SECRET

agents:
  default_language: "en_US"
  max_context_tokens: 8192

# Tiered 3 pass JSON payload pipeline (documentation/multi_agent_payload_protocol.md).
# When enabled, run_loop routes through the validation gated tier agents instead
# of the free text researcher/QA loop. Also switchable per run with --payload.
payload_pipeline:
  enabled: false
  max_attempts: 3
  artifact_dir: "logs/payloads"
  # Fail fast before pass 1: verify each tier's provider is reachable, the
  # Ollama tag exists, and a one token generation succeeds. The timeout is
  # per model and generous so a large local model can cold load.
  preflight: true
  preflight_timeout: 120.0
  # Request timeout in seconds for each tier LLM call (passed to
  # litellm.completion). 600 matches LiteLLM's own default; raise it when a
  # large local model needs longer to generate the full payload envelope.
  timeout: 600.0
  # Provider exceptions (connection refused, timeout, HTTP 5xx) are retried
  # this many extra times with exponential backoff (transport_backoff * 2^n
  # seconds) before the pass aborts with UPSTREAM_UNAVAILABLE. Transport
  # retries never consume validation gate attempts.
  transport_retries: 2
  transport_backoff: 2.0
  # Provider enforced structured outputs: pass the AgentTaskPayload JSON
  # schema to litellm as response_format so the provider constrains the
  # output shape mechanically (Ollama compiles it to a decoding grammar).
  # The validation gate still runs on every response; disable only if a
  # provider rejects the response_format parameter.
  structured_outputs: true
  # Per tier model overrides. Empty string falls back to the top level llm_model.
  # Tier 1 judges deserve the strongest model; Tier 3 drafting can run cheap and fast.
  tier_models:
    tier_1: ""  # e.g. "anthropic/claude-fable-5" or "claude_code" (shells out to headless `claude -p`, billing the Claude Pro subscription instead of an API key)
    tier_2: ""  # e.g. "anthropic/claude-sonnet-5"
    tier_3: ""  # e.g. "gemini/gemini-1.5-flash"
  # Per tier timeout overrides in seconds. 0 falls back to the timeout above.
  # A slow 30B local drafting model may need a long tier_3 while a hosted
  # tier_1 judge stays tight.
  tier_timeouts:
    tier_1: 0
    tier_2: 0
    tier_3: 0

skill_router:
  enabled: true
  top_k: 3
  score_threshold: 0.0
  max_context_chars: 12000
  skills_dir: ".agents/skills"

active_mcps:
  - memory
  - fetch

mcp_servers:
  github:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ""  # Add token here or via .env

  sqlite:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-sqlite"
      - "--db-path"
      - "test.db"

  fetch:
    command: "uvx"
    args:
      - "mcp-server-fetch"

  discord:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-discord"
    env:
      DISCORD_BOT_TOKEN: ""

  crunchyroll:
    command: "npx"
    args:
      - "-y"
      - "@striderlabs/mcp-crunchyroll"

  anilist:
    command: "npx"
    args:
      - "-y"
      - "mcp-server-anilist"

  postgres:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-postgres"
      - "postgresql://localhost/mydb"

  filesystem:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/var/home/howlcipher/dev"

  gitlab:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-gitlab"
    env:
      GITLAB_PERSONAL_ACCESS_TOKEN: ""

  kubernetes:
