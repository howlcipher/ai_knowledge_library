# Centralized Configuration Loader
database:
  chroma_db_path: ".chroma"
  mode: "sqlite" # 'sqlite' or 'pgvector'
  # Set pgvector_dsn in .env as DATABASE__PGVECTOR_DSN

server:
  host: "0.0.0.0"
  port: 8000
  # Set webhook_secret in .env as SERVER__WEBHOOK_SECRET

agents:
  default_language: "en_US"
  max_context_tokens: 8192

active_mcps:
  - memory
  - fetch

mcp_servers:
  github:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ""  # Add token here or via .env

  sqlite:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-sqlite"
      - "--db-path"
      - "test.db"

  fetch:
    command: "uvx"
    args:
      - "mcp-server-fetch"

  discord:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-discord"
    env:
      DISCORD_BOT_TOKEN: ""

  crunchyroll:
    command: "npx"
    args:
      - "-y"
      - "@striderlabs/mcp-crunchyroll"

  anilist:
    command: "npx"
    args:
      - "-y"
      - "mcp-server-anilist"

  postgres:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-postgres"
      - "postgresql://localhost/mydb"

  filesystem:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/var/home/howlcipher/dev"

  gitlab:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-gitlab"
    env:
      GITLAB_PERSONAL_ACCESS_TOKEN: ""

  kubernetes:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-kubernetes"

  docker:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-docker"

  yfinance:
    command: "uvx"
    args:
      - "mcp-server-yfinance"

  wikipedia:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-wikipedia"

  bravesearch:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: "" # Add your Brave Search API key here or via .env

  memory:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"

  sequentialthinking:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"

  puppeteer:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-puppeteer"

  gdrive:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-gdrive"

  jira:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-jira"
    env:
      JIRA_API_TOKEN: ""
      JIRA_EMAIL: ""
      JIRA_BASE_URL: ""

  linear:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-linear"
    env:
      LINEAR_API_KEY: ""
      
  trello:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-trello"
    env:
      TRELLO_API_KEY: ""
      TRELLO_TOKEN: ""

  sentry:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-sentry"
    env:
      SENTRY_AUTH_TOKEN: ""

  aws:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-aws"

  strava:
    command: "npx"
    args:
      - "-y"
      - "mcp-server-strava"

  steam:
    command: "npx"
    args:
      - "-y"
      - "mcp-server-steam"

  shodan:
    command: "npx"
    args:
      - "-y"
      - "mcp-server-shodan"
    env:
      SHODAN_API_KEY: ""

  baseball:
    command: "npx"
    args:
      - "-y"
      - "mcp-server-baseball"
