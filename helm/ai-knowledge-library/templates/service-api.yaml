apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-knowledge-library.fullname" . }}-api
  labels:
    app: {{ include "ai-knowledge-library.name" . }}-api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "ai-knowledge-library.name" . }}-api
