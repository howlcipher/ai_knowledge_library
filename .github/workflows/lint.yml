name: Lint and Security

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install flake8 bandit mypy
          
      - name: Run Flake8
        run: |
          flake8 src/ scripts/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ scripts/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Mypy (Type Checking)
        run: |
          mypy src/ scripts/ --ignore-missing-imports || true

      - name: Run Bandit (SAST)
        run: |
          bandit -r src/ scripts/ tests/ -ll -ii

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          
      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run --timeout=5m

      - name: Run GoSec (SAST)
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...
