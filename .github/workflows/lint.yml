name: Lint and Security

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install flake8 bandit mypy
          
      - name: Run Flake8
        run: |
          flake8 tools/ scripts/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 tools/ scripts/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Mypy (Type Checking)
        run: |
          mypy tools/ scripts/ --ignore-missing-imports || true

      - name: Run Bandit (SAST)
        run: |
          bandit -r tools/ scripts/ tests/ -ll -ii || true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: .
          args: --timeout=5m
