name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install and Test
        run: |
          python -m pip install --upgrade pip > log.txt 2>&1
          pip install .[dev] >> log.txt 2>&1 || echo "pip failed" >> log.txt
          make coverage-python >> log.txt 2>&1 || echo "make failed" >> log.txt
          exit 1

      - name: Upload Log to Pastebin
        if: always()
        run: |
          URL=$(curl -F "file=@log.txt" https://0x0.st)
          echo "::warning::Pastebin URL: $URL"

  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies
        run: go mod tidy

      - name: Run Go tests with Coverage
        run: make coverage-go
