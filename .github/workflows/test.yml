name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run Pytest with Coverage
        run: make coverage-python > pytest_output.txt 2>&1 || exit 1

      - name: Create Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -n 100 pytest_output.txt > tail_output.txt
          gh issue create --title "CI Failure: test-python" --body-file tail_output.txt || true

  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies
        run: go mod tidy

      - name: Run Go tests with Coverage
        run: make coverage-go
