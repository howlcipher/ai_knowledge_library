<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "AI_KNOWLEDGE_LIBRARY" }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/cyberpunk.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="crt-overlay"></div>
    <header class="page-header">
      <div class="header-content">
        <h1 class="project-name">SYS_CORE<span class="blink">_</span></h1>
        <div class="hamburger-menu" id="hamburger-menu">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
        <nav class="nav-links" id="nav-links">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/docs.html' | relative_url }}">Index</a>
          <a href="{{ '/documentation/USER_GUIDE.html' | relative_url }}">Manual</a>
          <a href="{{ '/change_log.html' | relative_url }}">Logs</a>
          <a href="{{ '/AGENTS.html' | relative_url }}">Rules</a>
        </nav>
      </div>
    </header>

    <main id="content" class="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>SYS_VER 1.0 // ANTIGRAVITY ENGINE // NEURAL NET ACTIVE</p>
    </footer>

    <script>
      const hamburger = document.getElementById('hamburger-menu');
      const navLinks = document.getElementById('nav-links');

      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navLinks.classList.toggle('active');
        this.classList.toggle('open');
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(event) {
        if (!navLinks.contains(event.target) && navLinks.classList.contains('active')) {
          navLinks.classList.remove('active');
          hamburger.classList.remove('open');
        }
      });
    </script>
  </body>
</html>
